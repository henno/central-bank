rules:
  decimal-string-money:
    description: Monetary amounts must have decimal format and pattern
    severity: error
    given:
      - $.components.schemas.*.properties[?(@.format == "decimal" && !(@.name && @.name.includes("rate")))]
    then:
      - field: pattern
        function: truthy
      - field: pattern
        function: pattern
        functionOptions:
          match: "\\."

  decimal-string-exchange-rate:
    description: Exchange rates must have decimal format with pattern
    severity: error
    given:
      - $.components.schemas.*.properties[?(@.name && @.name.includes("rate") && @.format == "decimal")]
    then:
      - field: pattern
        function: truthy
      - field: pattern
        function: pattern
        functionOptions:
          match: "\\."

  account-number-pattern:
    description: Account numbers must match 8-character pattern
    severity: error
    given:
      - $.components.schemas.*.properties[?(@.name && (@.name == "accountNumber" || @.name == "sourceAccount" || @.name == "destinationAccount"))]
    then:
      - field: pattern
        function: pattern
        functionOptions:
          match: "^[A-Z0-9]{8}$"

  currency-code-pattern:
    description: Currency codes must match ISO 4217 pattern
    severity: error
    given:
      - $.components.schemas.*.properties[?(@.name && (@.name == "currency" || @.name == "baseCurrency"))]
    then:
      - field: pattern
        function: pattern
        functionOptions:
          match: "^[A-Z]{3}$"