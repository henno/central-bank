# Spectral ruleset for OpenAPI 3.1 contract validation
# This configuration enforces project-specific patterns and best practices

extends:
  - '@stoplight/spectral-rulesets/asyncapi'
  - '@stoplight/spectral-rulesets/oas'

rules:
  # Enable standard OpenAPI rules
  operation-operationId: warn
  operation-tags: warn
  path-parameters: warn
  operation-description: warn

  # Custom rules for monetary amounts
  decimal-string-money:
    description: Monetary amounts must use decimal string format with pattern
    severity: error
    given:
      - $.paths.*.*[*].responses.*.content["application/json"].schema.*$..properties[?(@.format == 'decimal')]
      - $.components.schemas.*.properties[?(@.format == 'decimal')]
    then:
      - field: pattern
        function: pattern
        functionOptions:
          match: '^-?\d+\.\d{2}$'
      - field: description
        function: length
        functionOptions:
          min: 10

  # Custom rule for decimal strings with up to 6 decimal places (exchange rates)
  decimal-string-exchange-rate:
    description: Exchange rates must use decimal string format with up to 6 decimal places
    severity: error
    given:
      - $.components.schemas.*.properties[?(@.description && @.description.includes("exchange") && @.format == 'decimal')]
      - $.components.schemas.*.additionalProperties.[?(@.format == 'decimal')]
    then:
      - field: pattern
        function: pattern
        functionOptions:
          match: '^\d+\.\d{1,6}$'

  # Custom rule for account number patterns
  account-number-pattern:
    description: Account numbers must follow the 8-character pattern
    severity: error
    given:
      - $.paths.*.*[*].parameters[?(@.name == "accountNumber" || @.name == "sourceAccount" || @.name == "destinationAccount")].schema
      - $.components.schemas.*.properties[?(@.name == "accountNumber" || @.name == "sourceAccount" || @.name == "destinationAccount")]
    then:
      - field: pattern
        function: pattern
        functionOptions:
          match: '^[A-Z0-9]{8}$'

  # Custom rule for currency code patterns
  currency-code-pattern:
    description: Currency codes must be 3-letter ISO 4217 codes
    severity: error
    given:
      - $.components.schemas.*.properties[?(@.name == "currency" || @.name == "baseCurrency")]
      - $.components.schemas.*.properties[?(@.description && @.description.includes("currency"))]
    then:
      - field: pattern
        function: pattern
        functionOptions:
          match: '^[A-Z]{3}$'

  # Custom rule for transfer ID with UUID format
  transfer-id-required:
    description: Transfer-related operations must include transferId with UUID format
    severity: error
    given:
      - $.components.schemas[?(/Transfer/i.test(@))]
    then:
      - field: $..properties.transferId
        function: length
        functionOptions:
          min: 1
      - field: $..properties.transferId.format
        function: enumeration
        functionOptions:
          values: ['uuid']

  # Custom rule for server-side timestamps
  timestamp-server-side:
    description: Timestamps should use date-time format and mention server-side storage in description
    severity: warn
    given:
      - $.components.schemas.*.properties[?(@.name && (@.name.includes('timestamp') || @.name.includes('createdAt') || @.name.includes('updatedAt')))]
    then:
      - field: format
        function: enumeration
        functionOptions:
          values: ['date-time']
      - field: description
        function: pattern
        functionOptions:
          match: 'server'

  # Ensure examples are present for important schemas
  examples-for-request-bodies:
    description: Request bodies should include examples
    severity: warn
    given:
      - $.paths.*.*[*].requestBody.content["application/json"]
    then:
      - field: examples
        function: length
        functionOptions:
          min: 1

  examples-for-responses:
    description: Responses should include examples
    severity: warn
    given:
      - $.paths.*.*[*].responses.*.content["application/json"]
    then:
      - field: examples
        function: length
        functionOptions:
          min: 1

  # Ensure error responses are well-documented
  error-response-format:
    description: Error responses must follow the standard Error schema
    severity: error
    given:
      - $.paths.*.*[*].responses.[?(@ >= 400)].content["application/json"].schema
    then:
      - field: $ref
        function: pattern
        functionOptions:
          match: '#/components/schemas/Error'
    subject: body

  # Ensure operation descriptions are present
  operation-description-length:
    description: Operations should have meaningful descriptions
    severity: warn
    given:
      - $.paths.*.*[*]
    then:
      - field: description
        function: length
        functionOptions:
          min: 50

  # Ensure all paths have operationId
  operation-missing-id:
    description: All operations should have an operationId
    severity: warn
    given:
      - $.paths.*.*
    then:
      - field: operationId
        function: length
        functionOptions:
          min: 1